baseURL = "https://shadow-wd.github.io/"
languageCode = "zh-cn"
title = "梦起白沙"
theme = "ananke"

[params]
  description = "Linux · 读书 · 想法"
  author = "梦起白沙"
  # 开关：显示文章发布日期
  show_posted_date = true
  # 开关：显示文章阅读时间
  show_reading_time = true
  # 开关：显示文章目录（TOC）
  show_toc = true
  # 底部版权文字
  copyright = "© 2026 你的名字. 保留所有权利."

  # ====================================
  # 社交链接（Ananke顶部自动显示图标）
  # 留空 = 不显示该图标
  # ====================================
  twitter = "https://twitter.com/yourname"
  github = "https://github.com/yourname"
  instagram = "https://instagram.com/yourname"
  youtube = ""
  linkedin = ""
  featured_image = '/images/header_images.png'

# ======================================
# 三、顶部导航菜单（Ananke自动渲染）
# 自定义菜单名称、顺序、链接
# ======================================
[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1  # 数字越小越靠前

  [[menu.main]]
    name = "Articles"
    url = "/posts/"
    weight = 2

  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 3
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 4